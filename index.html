<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Imagem do dado -->
  <img src="./assets/pngtree-a-vibrant-blue-gaming-dice-with-glossy-and-polished-surface-featuring-png-image_15195497.png" alt="Dado" class="dice-img">

  <h2>Sortear um Número</h2>

  <div class="inputs">
    <input placeholder="entre" class="input-min" type="number">
    <input placeholder="e" class="input-max" type="number">
  </div>

  <button onclick="generateNumber()" class="botao-sorteio">Sortear</button>

  <h3>Número Sorteado</h3>
  <div class="resultado">0</div>

</div>

<script src="script.js"></script>
</body>
</html>
